org.gradle.jvmargs=-Xmx2048m
android.useAndroidX=false
kotlin.code.style=official

# Keep resource paths as authored. AGP shortens and renames them in release
# builds by default (res/mipmap-mdpi-v4/ic_launcher.png becomes res/nk.png),
# which would leave the repacker unable to tell which entry is the launcher
# icon — it swaps icons by the paths manifest.json declares.
android.enableResourceOptimizations=false
